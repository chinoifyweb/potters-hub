# Copy to /etc/nginx/sites-available/tphc.org.ng then: sudo ln -s /etc/nginx/sites-available/tphc.org.ng /etc/nginx/sites-enabled/ && sudo nginx -t && sudo systemctl reload nginx

# --------------------------------------------------------------------
# HTTP -> HTTPS redirect
# --------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name tphc.org.ng www.tphc.org.ng;

    # Allow ACME HTTP-01 challenge (certbot) before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --------------------------------------------------------------------
# HTTPS — Next.js app reverse proxy
# --------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tphc.org.ng www.tphc.org.ng;

    # SSL certificates (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/tphc.org.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tphc.org.ng/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload size — audio files, covers, attachments
    client_max_body_size 50m;

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/ld+json
        application/manifest+json
        application/vnd.ms-fontobject
        font/ttf
        font/otf
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;

    # Long cache for built Next.js static assets (hashed filenames)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # Favicon & robots — short cache, quiet logs
    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400" always;
        access_log off;
        log_not_found off;
    }

    # Main app — reverse proxy to Next.js on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Websocket / HMR support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-running requests (uploads, streaming)
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_buffering off;
        proxy_redirect off;
    }
}
